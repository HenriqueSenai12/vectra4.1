<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECTRA - Monitoramento</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vectra: {
                            dark: '#0B1120',    
                            light: '#06b6d4', 
                            panel: '#0f172a',
                            border: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="painel_principal.css">
    <style>
        .apexcharts-canvas, .apexcharts-canvas svg {
            max-height: 100% !important;
        }
        .apexcharts-tooltip {
            background: #0f172a !important;
            border: 1px solid #1e293b !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
            color: #fff;
        }
        .apexcharts-tooltip-title {
            background: #1e293b !important;
            border-bottom: 1px solid #334155 !important;
            font-weight: bold !important;
        }
    </style>
</head>

<body class="font-sans antialiased text-white overflow-x-hidden bg-vectra-dark">
    
    <div id="aurora-container"></div>

    <div class="relative z-10 flex h-screen w-screen overflow-hidden">
        
        <aside id="sidebar" class="w-64 bg-vectra-panel/80 backdrop-blur-xl border-r border-vectra-border h-full flex flex-col z-50 transition-all duration-300 shadow-[4px_0_24px_rgba(0,0,0,0.2)]">
            <div class="h-20 flex items-center justify-start px-6 border-b border-white/5 overflow-hidden">
                <div class="flex items-center container-logo">
                    <img src="../../image/logo_2.png" alt="Logo Vectra" class="h-10 w-auto transition-all duration-300">
                    <span class="sidebar-text text-white font-bold text-xl ml-3 tracking-wider whitespace-nowrap">VECTRA</span>
                </div>
            </div>

          <nav class="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto overflow-x-hidden no-scrollbar">
                <a href="painel_principal.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                   <i class="ph ph-house text-2xl min-w-[24px]"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Home</span>
                </a>
                
                                <a href="painel_monitoramento.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-chart-pie text-2xl min-w-[24px] group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Dashboard</span>
                </a>
                
                
                <a href="painel_usuarios.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-users text-2xl min-w-[24px] group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Usuários</span>
                </a>
                
                <a href="painel_config.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-gear text-2xl min-w-[24px] group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Configurações.</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/5">
                <a href="../login.html" class="sidebar-item text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 flex items-center p-2 rounded-xl transition-all duration-300">
                    <i class="ph ph-sign-out text-2xl min-w-[24px]"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap">Sair</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full w-full overflow-y-auto">
            
            <header class="h-20 bg-vectra-panel/80 backdrop-blur-xl shadow-[0_4px_24px_rgba(0,0,0,0.2)] flex items-center justify-between px-8 z-10 sticky top-0 border-b border-vectra-border shrink-0">
                <div class="flex items-center gap-4">
                    <button id="menu-btn" class="text-white hover:text-vectra-light transition-colors">
                        <i class="ph ph-list text-3xl"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-bold text-white">Monitoramento Global</h1>
                        <p class="text-sm text-slate-400">Análise de dados em tempo real</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <button id="btn-atualizar" class="flex items-center gap-2 px-4 py-2 bg-vectra-border text-vectra-light rounded-lg hover:bg-vectra-light/20 transition-all border border-vectra-light/30">
                        <i id="icon-atualizar" class="ph ph-arrows-clockwise text-xl"></i>
                        <span class="font-medium text-sm hidden sm:block">Atualizar Dados</span>
                    </button>
                    <img id="userAvatarHeader" src="https://ui-avatars.com/api/?name=Operador&background=06b6d4&color=fff" alt="Avatar" class="w-10 h-10 rounded-full border border-white/20">
                </div>
            </header>
            
            <section class="p-4 lg:p-8 space-y-6">
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-vectra-panel/60 border border-vectra-border rounded-2xl p-6 shadow-xl lg:col-span-2">
                        <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Eventos ao Longo do Tempo</h3>
                        <div id="line-chart" class="w-full h-72"></div>
                    </div>

                    <div class="bg-vectra-panel/60 border border-vectra-border rounded-2xl p-6 shadow-xl flex flex-col">
                        <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Distribuição de Status</h3>
                        <div id="donut-chart" class="w-full flex-1 min-h-[200px] flex items-center justify-center"></div>
                    </div>

                    <div class="bg-vectra-panel/60 border border-vectra-border rounded-2xl p-6 shadow-xl lg:col-span-3">
                        <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Comparativo Operacional</h3>
                        <div id="bar-chart-horizontal" class="w-full h-72"></div>
                    </div>
                </div>

                <div class="bg-vectra-panel/60 border border-vectra-border rounded-2xl shadow-xl overflow-hidden">
                    <div class="p-6 border-b border-vectra-border bg-vectra-panel/40">
                        <h3 class="text-lg font-bold text-white flex items-center gap-2">
                            <i class="ph ph-list-bullets text-vectra-light"></i> Histórico de Registros
                        </h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[700px]">
                            <thead class="bg-vectra-panel/80 text-xs uppercase text-slate-400">
                                <tr>
                                    <th class="py-4 px-6 font-semibold border-b border-vectra-border">Data</th>
                                    <th class="py-4 px-6 font-semibold border-b border-vectra-border">Início</th>
                                    <th class="py-4 px-6 font-semibold border-b border-vectra-border">Fim</th>
                                    <th class="py-4 px-6 font-semibold border-b border-vectra-border">Tempo</th>
                                    <th class="py-4 px-6 font-semibold border-b border-vectra-border">Status</th>
                                </tr>
                            </thead>
                            <tbody id="log-table-body" class="text-sm text-slate-300 divide-y divide-vectra-border">
                                </tbody>
                        </table>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script src="/frontend/js/monitoramento.js"></script>
    <script src="/frontend/js/painel.js"></script>
</body>
</html>
