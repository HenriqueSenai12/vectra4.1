<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECTRA - Configurações</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vectra: {
                            dark: '#1E3A5F',    
                            light: '#4FA3FF',   
                            base: '#0B1120',    
                            panel: '#152036'    
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="painel_principal.css">
</head>

<body class="font-sans antialiased text-white transition-colors duration-300">
    
    <div id="aurora-container">
        <div class="aurora-extra"></div>
    </div>

    <div class="relative z-10 flex h-screen w-screen overflow-hidden">
        
        <aside id="sidebar" class="bg-[#0E1F35]/50 backdrop-blur-xl border-r border-white/10 h-full flex flex-col z-40 shadow-[4px_0_24px_rgba(0,0,0,0.2)]">
            <div class="h-20 flex items-center justify-start px-6 border-b border-white/5 overflow-hidden">
                <div class="flex items-center container-logo">
                    <img src="../../image/logo_2.png" alt="Logo Vectra">
                    <span class="sidebar-text text-white font-bold text-xl ml-3 tracking-wider whitespace-nowrap">VECTRA</span>
                </div>
            </div>

            <nav class="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto overflow-x-hidden no-scrollbar">
                <a href="painel_principal.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-house text-2xl min-w-[24px]"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Home</span>
                </a>
                
                <a href="painel_monitoramento.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-chart-pie text-2xl min-w-[24px] group-hover:scale-110 transition-transform duration-300"></i>          
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Dashboard</span>
                </a>
                
                <a href="painel_usuarios.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-users text-2xl min-w-[24px] group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Usuários</span>
                </a>
                
                <a href="#" class="sidebar-item active text-vectra-light bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-gear text-2xl min-w-[24px] scale-110 transition-transform duration-300"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Configurações</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/5 overflow-hidden">
                <a href="../login.html" data-tooltip="Sair" class="sidebar-item text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 flex items-center p-2 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-rose-500 rounded-r-md shadow-[0_0_10px_#f43f5e] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-sign-out text-2xl min-w-[24px] group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap">Sair</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full w-full overflow-y-auto">
            
            <header class="h-20 bg-[#0E1F35]/50 backdrop-blur-xl shadow-[0_4px_24px_rgba(0,0,0,0.2)] flex items-center justify-between px-8 z-10 sticky top-0 border-b border-white/10 shrink-0">
                <div class="flex items-center gap-4">
                    <button id="menu-btn" class="text-white hover:text-vectra-light transition-colors">
                        <i class="ph ph-list text-3xl"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-bold text-white">Configurações</h1>
                        <p class="text-sm text-slate-400">Gerencie suas preferências e dados da conta.</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <button class="text-slate-400 hover:text-white transition-colors relative">
                        <i class="ph ph-bell text-2xl"></i>
                    </button>
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=1E3A5F&color=fff" alt="Avatar" class="w-10 h-10 rounded-full border border-white/20 cursor-pointer">
                </div>
            </header>

            <div class="px-8 mt-8 border-b border-white/10 flex gap-8 overflow-x-auto no-scrollbar shrink-0">
                <button class="pb-4 text-vectra-light border-b-2 border-vectra-light font-medium whitespace-nowrap">Detalhes Pessoais</button>
            </div>

            <section class="p-8 max-w-5xl mx-auto w-full flex-1">
                
                <div class="bg-[#152036]/80 backdrop-blur-md rounded-2xl border border-white/5 shadow-2xl p-8 mb-8 relative group">
                    
                    <div class="flex justify-between items-center mb-8 pb-4 border-b border-white/10">
                        <h3 class="text-xl font-bold text-white flex items-center gap-2">
                            Informações Pessoais
                        </h3>
                        <button id="btn-edit" class="flex items-center gap-2 text-slate-400 hover:text-vectra-light transition-colors px-3 py-1.5 rounded-lg hover:bg-white/5 border border-transparent hover:border-white/10">
                            <i class="ph ph-pencil-simple text-lg"></i>
                            <span class="text-sm font-medium">Editar</span>
                        </button>
                    </div>

                    <div id="user-info-form" class="space-y-6">
                        
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center group/row">
                            <div class="text-slate-400 font-medium text-sm">Nome</div>
                            <div class="md:col-span-3">
                                <input type="text" id="input-nome" disabled 
                                    class="w-full bg-transparent border border-transparent text-white font-medium p-2 rounded-lg transition-all focus:outline-none disabled:opacity-90 disabled:cursor-default">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center group/row">
                            <div class="text-slate-400 font-medium text-sm">E-mail <span class="text-xs text-slate-600 block">(Apenas leitura)</span></div>
                            <div class="md:col-span-3">
                                <input type="email" id="input-email" disabled readonly
                                    class="w-full bg-transparent border border-transparent text-white font-medium p-2 rounded-lg transition-all focus:outline-none disabled:opacity-90 disabled:cursor-default">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center group/row">
                            <div class="text-slate-400 font-medium text-sm">Nova Senha</div>
                            <div class="md:col-span-3">
                                <input type="password" id="input-senha" placeholder="••••••••" disabled 
                                    class="w-full bg-transparent border border-transparent text-white font-medium p-2 rounded-lg transition-all focus:outline-none disabled:opacity-90 disabled:cursor-default">
                            </div>
                        </div>

                    </div>
                </div>

                <div id="action-buttons" class="flex justify-end gap-4 hidden opacity-0 transition-opacity duration-300">
                    <button id="btn-cancelar" class="px-6 py-2.5 rounded-xl text-slate-300 font-medium hover:text-white hover:bg-white/5 border border-transparent transition-colors">
                        Cancelar
                    </button>
                    <button id="btn-salvar" class="px-6 py-2.5 rounded-xl bg-vectra-light text-[#0B1120] font-bold hover:bg-blue-400 hover:shadow-[0_0_15px_#4FA3FF] transition-all duration-300">
                        Salvar Alterações
                    </button>
                </div>

            </section>
        </main>
    </div> 

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Sidebar Animação
            const menuBtn = document.getElementById('menu-btn');
            const sidebar = document.getElementById('sidebar');
            const sidebarTexts = document.querySelectorAll('.sidebar-text');
            
            let isCollapsed = false;
            if (menuBtn && sidebar) {
                menuBtn.addEventListener('click', () => {
                    isCollapsed = !isCollapsed;
                    if (isCollapsed) {
                        sidebar.classList.add('is-collapsed');
                        gsap.to(sidebarTexts, { 
                            opacity: 0, x: -10, duration: 0.2, stagger: 0.02, ease: "power1.inOut", 
                            onComplete: () => sidebarTexts.forEach(t => t.style.display = 'none') 
                        });
                        gsap.to(sidebar, { width: "80px", duration: 0.4, ease: "power2.inOut", delay: 0.1 });
                    } else {
                        sidebar.classList.remove('is-collapsed');
                        sidebarTexts.forEach(t => t.style.display = '');
                        gsap.to(sidebar, { width: "16rem", duration: 0.4, ease: "power2.inOut" });
                        gsap.to(sidebarTexts, { opacity: 1, x: 0, duration: 0.3, stagger: 0.04, ease: "power2.out", delay: 0.2 });
                    }
                });
            }

            // Elementos do Formulário
            const btnEdit = document.getElementById('btn-edit');
            const btnCancelar = document.getElementById('btn-cancelar');
            const btnSalvar = document.getElementById('btn-salvar');
            const actionButtons = document.getElementById('action-buttons');
            const formInputs = document.querySelectorAll('#user-info-form input:not([readonly])');
            let valoresOriginais = {};
            
            // Variável Mágica para guardar o ID
            let loggedUserId = null;

            function toggleEditMode(editing) {
                formInputs.forEach(input => {
                    if (editing) {
                        valoresOriginais[input.id] = input.value;
                        input.disabled = false;
                        input.classList.remove('border-transparent', 'bg-transparent');
                        input.classList.add('border-white/20', 'bg-[#0B1120]');
                    } else {
                        input.disabled = true;
                        input.classList.add('border-transparent', 'bg-transparent');
                        input.classList.remove('border-white/20', 'bg-[#0B1120]');
                    }
                });
                
                if (editing) {
                    actionButtons.classList.remove('hidden', 'opacity-0');
                    btnEdit.style.display = 'none';
                } else {
                    actionButtons.classList.add('opacity-0');
                    setTimeout(() => {
                        actionButtons.classList.add('hidden');
                        btnEdit.style.display = 'flex';
                    }, 300);
                }
            }

            btnEdit?.addEventListener('click', () => toggleEditMode(true));
            
            btnCancelar?.addEventListener('click', () => {
                Object.keys(valoresOriginais).forEach(id => {
                    const input = document.getElementById(id);
                    if (input) input.value = valoresOriginais[id];
                });
                toggleEditMode(false);
                document.getElementById('input-senha').value = ''; // Limpa a senha se cancelar
            });

            // ===============================================================
            // 1. CARREGAR OS DADOS DO USUÁRIO NA TELA
            // ===============================================================
            async function loadUserProfile() {
                try {
                    // 1. Pega os dados que já foram salvos no navegador no momento do Login
                    const storedUser = JSON.parse(localStorage.getItem('vectraUser') || '{}');
                    const nomeLogado = storedUser.nome || storedUser.nome_completo || 'Usuário';
                    const emailLogado = storedUser.email || '';
                    
                    if (!nomeLogado || nomeLogado === 'Usuário') return;

                    // 2. MOSTRA NA TELA IMEDIATAMENTE (Garante que o Avatar e os Inputs não fiquem em branco)
                    document.getElementById('input-nome').value = nomeLogado;
                    document.getElementById('input-email').value = emailLogado || 'Buscando e-mail...';
                    
                    // 👉 Funcionalidade do Avatar aplicada de imediato:
                    document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nomeLogado)}&background=1E3A5F&color=fff`;

                    // 3. Pede pro servidor a lista de todos os usuários para confirmar o ID e email
                    const response = await fetch('/api/users');
                    if (response.ok) {
                        const todosUsuarios = await response.json();
                        
                        // Procura qual usuário tem esse exato nome ou email
                        const myUser = todosUsuarios.find(u => u.nome_completo === nomeLogado || u.nome === nomeLogado || u.email === emailLogado);
                        
                        if (myUser) {
                            loggedUserId = myUser.id; // Guarda o ID para poder atualizar a senha!
                            
                            // Preenche os Inputs com os dados oficiais do banco
                            document.getElementById('input-nome').value = myUser.nome_completo || myUser.nome || '';
                            document.getElementById('input-email').value = myUser.email || '';
                            document.getElementById('input-senha').value = ''; // Mantém vazio por segurança
                            
                            // 👉 Atualiza a foto de Avatar novamente caso o nome completo do banco seja mais preciso
                            const nomeOficial = myUser.nome_completo || myUser.nome;
                            document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nomeOficial)}&background=1E3A5F&color=fff`;

                            // Atualiza o cache do navegador
                            storedUser.id = myUser.id;
                            storedUser.email = myUser.email;
                            localStorage.setItem('vectraUser', JSON.stringify(storedUser));
                        }
                    }
                } catch (error) {
                    console.error('Erro carregando perfil:', error);
                    // Não mostramos showToast de erro aqui, pois a tela já foi preenchida no passo 2!
                }
            }

            // Inicia o carregamento assim que a página abrir
            loadUserProfile();

            // ===============================================================
            // 2. SALVAR AS MUDANÇAS NO BANCO
            // ===============================================================
            btnSalvar?.addEventListener('click', async () => {
                if (!loggedUserId) {
                    showToast('Erro: ID do usuário não encontrado.', 'error');
                    return;
                }

                const originalContent = btnSalvar.innerHTML;
                btnSalvar.innerHTML = '<i class="ph ph-spinner animate-spin mr-2 text-sm"></i>Salvando...';
                btnSalvar.disabled = true;

                try {
                    const novoNome = document.getElementById('input-nome').value;
                    const novaSenha = document.getElementById('input-senha').value;

                    // O Servidor atual aceita atualizar 'nome_completo' e 'senha'
                    const userData = {
                        nome_completo: novoNome,
                        senha: novaSenha || undefined // Se deixar a senha em branco, o banco ignora
                    };

                    const response = await fetch(`/api/users/${loggedUserId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });

                    if (response.ok) {
                        showToast('Perfil atualizado com sucesso!');
                        toggleEditMode(false);
                        
                        // Atualiza a foto se ele mudou de nome
                        document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(novoNome)}&background=1E3A5F&color=fff&t=${Date.now()}`;
                        
                        // ATENÇÃO: Atualiza o localStorage com o nome novo, para o sistema não te expulsar da tela!
                        const storedUser = JSON.parse(localStorage.getItem('vectraUser') || '{}');
                        storedUser.nome = novoNome;
                        localStorage.setItem('vectraUser', JSON.stringify(storedUser));
                        
                    } else {
                        showToast('Erro ao salvar no servidor', 'error');
                    }
                } catch (error) {
                    showToast('Erro de conexão: ' + error.message, 'error');
                } finally {
                    btnSalvar.innerHTML = originalContent;
                    btnSalvar.disabled = false;
                    document.getElementById('input-senha').value = ''; // Limpa a senha visualmente
                }
            });

            function showToast(message, type = 'success') {
                const existingToast = document.getElementById('vectra-toast');
                if (existingToast) existingToast.remove();

                const toast = document.createElement('div');
                toast.id = 'vectra-toast';
                toast.className = 'fixed top-4 right-4 z-[10000] p-4 rounded-xl shadow-2xl border max-w-md font-medium flex items-center gap-2 ' +
                    (type === 'success' ? 'bg-emerald-500/20 backdrop-blur border-emerald-400/50 text-emerald-100' : 'bg-red-500/20 backdrop-blur border-red-400/50 text-red-100');
                toast.innerHTML = '<i class="ph ph-' + (type === 'success' ? 'check-circle' : 'x-circle') + ' text-lg flex-shrink-0"></i><span>' + message + '</span>';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }
        });
    </script>
    <script src="../js/painel.js"></script>
</body>
</html>
