<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectra - Acesse sua conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="bg-lines"></div>

<div class="bg-lines"></div>
<div class="caixa-de-vidro-logo"></div>
<div class="logo-container">

        <img src="../image/logo_2.png" alt="Logo Vectra"
        class="logo-livre">
    
</div>


    <div class="login-card">
        <h2>Cadastro</h2>
        <form action="#" method="POST" id="loginForm">

            <div class="input-group">
                <label for="email">E-mail</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope icon-left"></i>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" id="password" placeholder="Digite sua senha" style="padding-right: 45px;" required>
                    <i class="fa-regular fa-eye icon-right" id="togglePassword"></i>
                </div>
            </div>

            

            <a type="submit" class="login-btn"href="login.html">Registrar</a>

            <div class="divider">
                <span>ou</span>
            </div>

            <div class="register-link">
                Já tem uma conta? <a href="login.html">Faça login aqui</a>
            </div>
        </form>
    </div>

    <script src="../backend/cadastro.js"></script>
    <script type="module">
      import { supabase } from './js/supabase.js'
        
      // Exemplo: Testar se está funcionando
      console.log("Supabase carregado:", supabase)
        
      // Exemplo de função para pegar dados
      async function carregarDados() {
        const { data, error } = await supabase.from('sua_tabela').select('*')
        if (error) console.error('Erro:', error)
        else console.log('Dados:', data)
      }
    </script>
    <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
        const tipoAtual = passwordInput.getAttribute('type');
        const novoTipo = tipoAtual === 'password' ? 'text' : 'password';
        
        passwordInput.setAttribute('type', novoTipo);
        
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

    
    
</body>
</html>
