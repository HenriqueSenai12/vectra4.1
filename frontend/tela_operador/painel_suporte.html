<body class="font-sans antialiased text-white transition-colors duration-300">

                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                   <i class="ph ph-house text-2xl min-w-[24px]"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Home</span>

                </a>
               
                <a href="painel_config.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-3 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <i class="ph ph-gear text-2xl min-w-[24px] group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="sidebar-text ml-4 font-medium whitespace-nowrap transition-opacity duration-300">Configurações</span>

            </nav>

            <div class="p-4 border-t border-white/5 overflow-hidden">
                <a href="../login.html" class="sidebar-item text-slate-400 hover:text-vectra-light hover:bg-vectra-light/10 flex items-center p-2 rounded-xl relative group transition-all duration-300">
                    <div class="absolute left-0 w-1 h-8 bg-vectra-light rounded-r-md shadow-[0_0_10px_#4FA3FF] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

        <main class="flex-1 flex flex-col h-full w-full transition-all duration-300 overflow-y-auto">
            
            <header class="h-20 bg-[#0E1F35]/50 backdrop-blur-xl shadow-[0_4px_24px_rgba(0,0,0,0.2)] flex items-center justify-between px-8 z-10 sticky top-0 border-b border-white/10">
                <div class="flex items-center gap-4">

                        <i class="ph ph-list text-3xl"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-bold text-white">Suporte


                        </h1>

                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <button class="text-slate-400 hover:text-white transition-colors relative">

                    </button>

                    <img id="userAvatarHeader" src="https://ui-avatars.com/api/?name=Operador+Vectra&background=1E3A5F&color=fff" alt="Avatar" class="w-10 h-10 rounded-full border border-white/20 cursor-pointer user-avatar-header">

                </div>

           <div class="bg-[#152036]/80 backdrop-blur-md rounded-2xl border border-white/5 shadow-2xl p-8 max-w-6xl mx-auto w-full mt-10 mb-20 shrink-0 card-animado flex flex-col gap-6">
            <div class="flex justify-between items-center border-b border-white/10 pb-5 mb-2">
    <h2 class="text-2xl font-bold text-white">Nova Publicação</h2>
    <div class="flex gap-3">

    </div>
</div>

<div class="flex flex-col lg:flex-row gap-8 items-start">
    
    <div class="w-full lg:w-8/12 flex flex-col gap-6">
        
        

        <div id="drop-zone" class="w-full flex flex-col items-center justify-center border-2 border-dashed border-vectra-light/40 rounded-xl p-8 bg-[#0B1120]/50 hover:bg-[#0B1120]/80 transition-colors group cursor-pointer relative">
            <div class="absolute inset-0 bg-vectra-light/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            
            <i class="ph-fill ph-cloud-arrow-up text-5xl text-vectra-light mb-4 group-hover:scale-110 transition-transform"></i>
            <h3 class="text-white font-medium mb-4 z-10">Arraste o seu arquivo aqui</h3>
            
            <button id="btn-upload" class="bg-vectra-light hover:bg-blue-400 text-white font-semibold py-2 px-6 rounded-lg transition-colors text-sm shadow-md z-10">
                Procurar...
            </button>
            <input type="file" id="file-input" accept=".png, .jpg, .jpeg, .pdf" hidden>
            
            <p id="upload-info" class="text-xs text-slate-400 mt-4 z-10">Apenas arquivos PNG, JPG e PDF são suportados</p>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Título <span class="text-vectra-light">*</span></label>
            <input type="text" id="input-titulo" class="w-full bg-[#0B1120] border border-white/10 rounded-lg px-4 py-3 text-slate-200 focus:outline-none focus:border-vectra-light focus:ring-1 focus:ring-vectra-light transition-colors">
        </div>

        <div class="flex flex-col sm:flex-row gap-4 sm:items-end">
            <div class="flex-1">
                <label class="block text-sm font-medium text-slate-300 mb-2">Categoria <span class="text-vectra-light">*</span></label>
                <div class="relative">
                    <select id="input-categoria" class="w-full bg-[#0B1120] border border-white/10 rounded-lg px-4 py-3 text-slate-200 focus:outline-none focus:border-vectra-light focus:ring-1 focus:ring-vectra-light appearance-none cursor-pointer">
                        <option>Sem categoria</option>
                        <option>Sugestão/Melhoria</option>
                        <option>Manutenção</option>
                    </select>
                    <i class="ph ph-caret-down absolute right-4 top-3.5 text-slate-400 pointer-events-none"></i>
                </div>
            </div>
           
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-3">Compartilhável</label>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer" checked>
                <div class="w-12 h-6 bg-[#0B1120] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-vectra-light border border-white/10"></div>
                <span class="ml-3 text-sm font-bold text-vectra-light peer-checked:text-vectra-light">On</span>
            </label>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Descrição</label>
            <textarea id="input-descricao" rows="4" class="w-full bg-[#0B1120] border border-white/10 rounded-lg px-4 py-3 text-slate-200 resize-none focus:outline-none focus:border-vectra-light focus:ring-1 focus:ring-vectra-light transition-colors"></textarea>
        </div>
    </div>

    <div class="w-full lg:w-4/12 flex flex-col sticky top-0">
        <div class="bg-[#0B1120]/60 border border-white/5 rounded-xl p-4 flex flex-col h-full min-h-[400px]">
            <div class="flex justify-end mb-4">
                <button class="text-xs font-medium text-slate-400 border border-white/10 rounded px-3 py-1.5 hover:text-white hover:bg-white/5 transition-colors bg-[#152036]">
                    Upload Imagem
                </button>
            </div>
            
            <div class="flex-1 flex flex-col items-center justify-center bg-[#152036]/50 rounded-lg border border-white/5 mb-4 relative overflow-hidden group">
                <i class="ph ph-image text-7xl text-slate-600 mb-2 group-hover:scale-110 transition-transform duration-300"></i>
                <img id="image-preview" src="" class="absolute inset-0 w-full h-full object-cover hidden" alt="Preview">
            </div>

            <div class="border-t border-white/10 pt-4 mt-auto">
                <h4 class="text-white font-semibold">Pré-visualização da Publicação</h4>
            </div>
        </div>
    </div>

</div>
    
</div>
            
            <script src="../../backend/scripts.js"></script>
            <script src="../../backend/painel_suporte.js"></script>

        </main>
    </div> 

    <script>const menuBtn = document.getElementById('menu-btn');
const sidebar = document.getElementById('sidebar');
const sidebarTexts = document.querySelectorAll('.sidebar-text');

let isCollapsed = false;
if (menuBtn && sidebar) {
    menuBtn.addEventListener('click', () => {
        isCollapsed = !isCollapsed;
        if (isCollapsed) {
            sidebar.classList.add('is-collapsed');
            gsap.to(sidebarTexts, { 
                opacity: 0, x: -10, duration: 0.2, stagger: 0.02, ease: "power1.inOut", 
                onComplete: () => sidebarTexts.forEach(t => t.style.display = 'none') 
            });
            gsap.to(sidebar, { width: "80px", duration: 0.4, ease: "power2.inOut", delay: 0.1 });
        } else {
            sidebar.classList.remove('is-collapsed');
            sidebarTexts.forEach(t => t.style.display = '');
            gsap.to(sidebar, { width: "16rem", duration: 0.4, ease: "power2.inOut" });
            gsap.to(sidebarTexts, { opacity: 1, x: 0, duration: 0.3, stagger: 0.04, ease: "power2.out", delay: 0.2 });
        }
    });
}</script>
 <script src="../../backend/painel.js"></script>
</body>
</html>
